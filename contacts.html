<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контакты - Ring Boxing Club</title>
    <meta name="description" content="Контакты клуба: интерактивная карта, почта, телефоны, форма обратной связи, график работы.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header><!-- Навигация как на главной --></header>
    <main>
        <section class="contacts">
            <div class="container">
                <h2>Связаться с нами</h2>
                <form class="contact-form">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <label for="msg">Сообщение</label>
                    <textarea id="msg" name="msg" required></textarea>
                    <button type="submit">Отправить</button>
                </form>
                <div class="contact-info">
                    <p><strong>Адрес:</strong> г. Москва, ул. Спортивная, 15</p>
                    <p><strong>Телефон:</strong> +7 (999) 123-45-67</p>
                    <p><strong>Email:</strong> boxclub@example.com</p>
                </div>
            </div>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
