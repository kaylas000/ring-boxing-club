<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тренировки - Ring Boxing Club</title>
    <meta name="description" content="Запишитесь на тренировки по боксу в профессиональном клубе. Для всех уровней новичков и спортсменов.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header><!-- Навигация как на главной --></header>
    <main>
        <section class="training-programs">
            <div class="container">
                <h2>Программы тренировок</h2>
                <div class="programs-grid">
                    <div class="program-card">
                        <h3>Для начинающих</h3>
                        <ul>
                            <li>Основы стойки и перемещений</li>
                            <li>Техника базовых ударов</li>
                            <li>Работа с грушей и лапами</li>
                        </ul>
                        <button class="signup-btn">Записаться</button>
                    </div>
                    <div class="program-card">
                        <h3>Продвинутый уровень</h3>
                        <ul>
                            <li>Комбинации ударов</li>
                            <li>Тактика ведения боя</li>
                            <li>Спарринги</li>
                        </ul>
                        <button class="signup-btn">Записаться</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
